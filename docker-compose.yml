services:
  postgres:
    image: postgres:16
    container_name: disputeflow-postgres
    environment:
      POSTGRES_DB: disputeflow
      POSTGRES_USER: disputeflow
      POSTGRES_PASSWORD: disputeflow_prod_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - disputeflow-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: disputeflow-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JAVA_OPTS: "-Xmx512m -Xms256m"
      PROCESSOR_URL: http://processor:8000

    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - disputeflow-network
    restart: unless-stopped

  processor:
    build: ./processor
    container_name: disputeflow-processor
    ports:
      - "8000:8000"
    networks:
      - disputeflow-network
    restart: unless-stopped

  mock-banks:
    build: ./mock-banks
    container_name: disputeflow-mock-banks
    ports:
      - "8001:8001"
    networks:
      - disputeflow-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: disputeflow-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - disputeflow-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  disputeflow-network:
    driver: bridge
