server {
    listen 80;
    server_name dispute-flow.app www.dispute-flow.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dispute-flow.app www.dispute-flow.app;

    ssl_certificate /etc/letsencrypt/live/dispute-flow.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dispute-flow.app/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://disputeflow-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}